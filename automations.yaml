- id: office_good_morning_lights
  alias: Office - Good morning lights on
  description: Turns on the office lights when I say "good morning" to the voice assistant
  triggers:
    - trigger: conversation
      command:
        - "good morning"
        - "good morning [please]"
        - "morning"
  conditions: []
  actions:
    # "Office" Hue grouped light (covers the whole office)
    - action: light.turn_on
      target:
        entity_id: light.office_office
    - set_conversation_response: "Good morning! Turning on the office lights."
  mode: single

- id: office_tuna_fish_lights_off
  alias: Office - Tuna fish lights off
  description: Turns off the office lights when I say "tuna fish" to the voice assistant
  triggers:
    - trigger: conversation
      command:
        - "tuna fish"
  conditions: []
  actions:
    # "Office" Hue grouped light (covers the whole office)
    - action: light.turn_off
      target:
        entity_id: light.office_office
    - set_conversation_response: "Tuna fish. Office lights off."
  mode: single

- id: office_purple_lights
  alias: Office - Purple lights
  description: Turns the office lights purple when I say "purple" to the voice assistant
  triggers:
    - trigger: conversation
      command:
        - "purple"
        - "make it purple"
        - "lights purple"
  conditions: []
  actions:
    # "Office" Hue grouped light (covers the whole office)
    - action: light.turn_on
      target:
        entity_id: light.office_office
      data:
        rgb_color: [128, 0, 128]
    - set_conversation_response: "Purple it is."
  mode: single
